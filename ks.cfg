# System Language and keyboard
lang en_US.UTF-8
keyboard us
timezone Asia/Kolkata --isUtc

# Network configuration
network --bootproto=dhcp --device=link --activate

# Root password 
rootpw --plaintext 74580

# Create a user
user --name=toji --groups=wheel --password=123456789 --plaintext

# partitioning
zerombr
clearpart --all --initlabel
autopart

# packages to install
%packages
@core
vim
nano
network-scripts
%end
